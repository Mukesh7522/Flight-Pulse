<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320">
  <!-- Background -->
  <rect width="820" height="320" rx="14" fill="#0A0E1A"/>
  <rect width="820" height="320" rx="14" fill="none" stroke="#1E293B" stroke-width="1.5"/>
  <text x="410" y="28" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#475569" letter-spacing="4">DATABASE  SCHEMA</text>

  <!-- ── Table 1: flights_live ── -->
  <rect x="14" y="42" width="242" height="266" rx="10" fill="#0D1424" stroke="#2DD4BF" stroke-width="2"/>
  <rect x="14" y="42" width="242" height="32" rx="10" fill="#134e4a" fill-opacity="0.7"/>
  <text x="135" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#5EEAD4" font-weight="bold">flights_live</text>
  <text x="135" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">~10,000 rows  live snapshot</text>
  <line x1="24" y1="82" x2="246" y2="82" stroke="#1E293B" stroke-width="1"/>
  <!-- col headers -->
  <text x="30"  y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">COLUMN</text>
  <text x="170" y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">TYPE</text>
  <line x1="24" y1="103" x2="246" y2="103" stroke="#1E293B" stroke-width="0.8"/>
  <!-- rows -->
  <text x="30"  y="118" font-family="ui-monospace,monospace" font-size="9" fill="#F59E0B">icao24</text>
  <text x="170" y="118" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TEXT  PK</text>
  <text x="30"  y="133" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">callsign</text>
  <text x="170" y="133" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TEXT</text>
  <text x="30"  y="148" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">origin_country</text>
  <text x="170" y="148" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TEXT</text>
  <text x="30"  y="163" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">lon</text>
  <text x="170" y="163" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE</text>
  <text x="30"  y="178" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">lat</text>
  <text x="170" y="178" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE</text>
  <text x="30"  y="193" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">baro_altitude</text>
  <text x="170" y="193" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE (m)</text>
  <text x="30"  y="208" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">geo_altitude</text>
  <text x="170" y="208" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE (m GPS)</text>
  <text x="30"  y="223" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">on_ground</text>
  <text x="170" y="223" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">BOOLEAN</text>
  <text x="30"  y="238" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">velocity</text>
  <text x="170" y="238" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE (m/s)</text>
  <text x="30"  y="253" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">true_track</text>
  <text x="170" y="253" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE (deg)</text>
  <text x="30"  y="268" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">vertical_rate</text>
  <text x="170" y="268" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">DOUBLE (m/s)</text>
  <text x="30"  y="283" font-family="ui-monospace,monospace" font-size="9" fill="#2DD4BF">ingested_at</text>
  <text x="170" y="283" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TIMESTAMPTZ</text>
  <line x1="24" y1="290" x2="246" y2="290" stroke="#1E293B" stroke-width="0.8"/>
  <text x="135" y="305" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7.5" fill="#2DD4BF">BEFORE UPDATE trigger stamps now()</text>

  <!-- ── Table 2: anomaly_hourly ── -->
  <rect x="288" y="42" width="232" height="266" rx="10" fill="#0D1424" stroke="#F59E0B" stroke-width="2"/>
  <rect x="288" y="42" width="232" height="32" rx="10" fill="#451a03" fill-opacity="0.7"/>
  <text x="404" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#FCD34D" font-weight="bold">anomaly_hourly</text>
  <text x="404" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">max 25 rows  24h window</text>
  <line x1="298" y1="82" x2="510" y2="82" stroke="#1E293B" stroke-width="1"/>
  <text x="300"  y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">COLUMN</text>
  <text x="430" y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">TYPE</text>
  <line x1="298" y1="103" x2="510" y2="103" stroke="#1E293B" stroke-width="0.8"/>
  <text x="300"  y="118" font-family="ui-monospace,monospace" font-size="9" fill="#F59E0B">hour_utc</text>
  <text x="430" y="118" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TIMESTAMPTZ PK</text>
  <text x="300"  y="133" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">ghost_count</text>
  <text x="430" y="133" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="300"  y="148" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">low_alt_count</text>
  <text x="430" y="148" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="300"  y="163" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">updated_at</text>
  <text x="430" y="163" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TIMESTAMPTZ</text>
  <line x1="298" y1="175" x2="510" y2="175" stroke="#1E293B" stroke-width="0.8"/>
  <text x="404" y="196" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#FCD34D">Purpose</text>
  <text x="404" y="214" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">Pre-aggregates ghost</text>
  <text x="404" y="229" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">and low-altitude counts</text>
  <text x="404" y="244" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">per hour. Powers 24h</text>
  <text x="404" y="259" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">timeline without scanning</text>
  <text x="404" y="274" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">millions of rows.</text>
  <line x1="298" y1="284" x2="510" y2="284" stroke="#1E293B" stroke-width="0.8"/>
  <text x="404" y="300" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7.5" fill="#F59E0B">purge: older than 25 hours</text>

  <!-- ── Table 3: pipeline_runs ── -->
  <rect x="552" y="42" width="254" height="266" rx="10" fill="#0D1424" stroke="#A78BFA" stroke-width="2"/>
  <rect x="552" y="42" width="254" height="32" rx="10" fill="#2e1065" fill-opacity="0.7"/>
  <text x="679" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#C4B5FD" font-weight="bold">pipeline_runs</text>
  <text x="679" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#475569">3-day retention  health log</text>
  <line x1="562" y1="82" x2="796" y2="82" stroke="#1E293B" stroke-width="1"/>
  <text x="564"  y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">COLUMN</text>
  <text x="710" y="98" font-family="ui-monospace,monospace" font-size="8" fill="#475569">TYPE</text>
  <line x1="562" y1="103" x2="796" y2="103" stroke="#1E293B" stroke-width="0.8"/>
  <text x="564"  y="118" font-family="ui-monospace,monospace" font-size="9" fill="#F59E0B">id</text>
  <text x="710" y="118" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">BIGSERIAL PK</text>
  <text x="564"  y="133" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">run_at</text>
  <text x="710" y="133" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TIMESTAMPTZ</text>
  <text x="564"  y="148" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">records_fetched</text>
  <text x="710" y="148" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="564"  y="163" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">records_upserted</text>
  <text x="710" y="163" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="564"  y="178" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">fetch_ms</text>
  <text x="710" y="178" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="564"  y="193" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">upsert_ms</text>
  <text x="710" y="193" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">INTEGER</text>
  <text x="564"  y="208" font-family="ui-monospace,monospace" font-size="9" fill="#A78BFA">status</text>
  <text x="710" y="208" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TEXT</text>
  <text x="564"  y="223" font-family="ui-monospace,monospace" font-size="9" fill="#94A3B8">error_msg</text>
  <text x="710" y="223" font-family="ui-monospace,monospace" font-size="8.5" fill="#64748B">TEXT nullable</text>
  <line x1="562" y1="234" x2="796" y2="234" stroke="#1E293B" stroke-width="0.8"/>
  <text x="679" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#C4B5FD">Used by ghost detection</text>
  <text x="679" y="268" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">MAX(run_at) WHERE status</text>
  <text x="679" y="283" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">= 'success' sets the ghost</text>
  <text x="679" y="298" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748B">detection threshold</text>
  <line x1="562" y1="304" x2="796" y2="304" stroke="#1E293B" stroke-width="0.8"/>
  <text x="679" y="314" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7.5" fill="#A78BFA">purge: older than 3 days</text>
</svg>
