  <text x="445" y="302" font-family="ui-sans-serif,Arial,sans-serif" font-size="28" font-weight="800" fill="#FCD34D" filter="url(#glow)">Ghost Flights</text>
  <text x="445" y="322" font-family="ui-sans-serif,Arial,sans-serif" font-size="13" fill="#94A3B8">anomaly detection engine</text>
  <line x1="445" y1="335" x2="755" y2="335" stroke="#1E293B" stroke-width="1"/>
  <text x="445" y="358" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Airborne + alt ≥ 5,000ft</text>
  <text x="445" y="376" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● ingested_at frozen &gt; 5 min</text>
  <text x="445" y="394" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Pulsing red ring on live map</text>

  <!-- Card 3 -->
  <rect x="810" y="270" width="350" height="140" rx="12" fill="url(#cardGrad1)" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="810" y="270" width="350" height="4" rx="2" fill="#A78BFA"/>
  <text x="830" y="302" font-family="ui-sans-serif,Arial,sans-serif" font-size="28" font-weight="800" fill="#C4B5FD" filter="url(#glow)">4 Pages</text>
  <text x="830" y="322" font-family="ui-sans-serif,Arial,sans-serif" font-size="13" fill="#94A3B8">full intelligence dashboard</text>
  <line x1="830" y1="335" x2="1140" y2="335" stroke="#1E293B" stroke-width="1"/>
  <text x="830" y="358" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Live Map · Analytics</text>
  <text x="830" y="376" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Anomalies · Insights</text>
  <text x="830" y="394" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Bloomberg-style UI, dark theme</text>

