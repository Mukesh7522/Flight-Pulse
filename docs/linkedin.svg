  <text x="1060" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">Analytics · Anomalies</text>
  <text x="1060" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">Insights · Bloomberg UI</text>
  <text x="1060" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">Auto-refresh 3 min</text>

  <!-- Arrow -->
  <line x1="932" y1="175" x2="958" y2="175" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arr)"/>

