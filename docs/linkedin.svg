  <circle cx="280" cy="610" r="2.5" fill="#F87171"/>

  <text x="270" y="574" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" fill="#475569" letter-spacing="2">LIVE MAP PREVIEW</text>
  <text x="270" y="645" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#334155">teal = active flight  ·  red pulse = ghost anomaly</text>

  <!-- URL & CTA -->
