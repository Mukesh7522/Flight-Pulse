  <text x="384" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#67E8F9">React</text>

  <!-- Vite -->
  <rect x="430" y="472" width="56" height="26" rx="13" fill="#1F1A2E" stroke="#A78BFA" stroke-width="1"/>
  <text x="458" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#C4B5FD">Vite</text>

  <!-- Tailwind -->
  <rect x="498" y="472" width="80" height="26" rx="13" fill="#0E2D3A" stroke="#2DD4BF" stroke-width="1"/>
  <text x="538" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#5EEAD4">Tailwind</text>

  <!-- Leaflet -->
  <rect x="590" y="472" width="70" height="26" rx="13" fill="#1A2E1A" stroke="#22C55E" stroke-width="1"/>
  <text x="625" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#86EFAC">Leaflet</text>

  <!-- Recharts -->
  <rect x="672" y="472" width="80" height="26" rx="13" fill="#2E1A1A" stroke="#F87171" stroke-width="1"/>
  <text x="712" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#FCA5A5">Recharts</text>

  <!-- GitHub Actions -->
  <rect x="764" y="472" width="118" height="26" rx="13" fill="#1A1A2E" stroke="#6366F1" stroke-width="1"/>
  <text x="823" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#A5B4FC">GitHub Actions</text>

  <!-- Vercel -->
  <rect x="894" y="472" width="68" height="26" rx="13" fill="#1A1A1A" stroke="#94A3B8" stroke-width="1"/>
  <text x="928" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#CBD5E1">Vercel</text>

  <!-- OpenSky -->
  <rect x="974" y="472" width="80" height="26" rx="13" fill="#0E2D3A" stroke="#06B6D4" stroke-width="1"/>
  <text x="1014" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#67E8F9">OpenSky</text>

  <!-- dbt -->
  <rect x="1066" y="472" width="50" height="26" rx="13" fill="#2E1A10" stroke="#F59E0B" stroke-width="1"/>
  <text x="1091" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#FCD34D">SQL</text>

