  <rect x="40" y="270" width="350" height="140" rx="12" fill="url(#cardGrad1)" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="40" y="270" width="350" height="4" rx="2" fill="#2DD4BF"/>
  <text x="60" y="302" font-family="ui-sans-serif,Arial,sans-serif" font-size="28" font-weight="800" fill="#2DD4BF" filter="url(#glow)">~9,000</text>
