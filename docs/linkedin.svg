  <text x="80" y="625" font-family="ui-monospace,monospace" font-size="9" fill="#1E3A4A">········  ·················  ········</text>

  <!-- Flight dots on fake map -->
  <circle cx="160" cy="595" r="2.5" fill="#2DD4BF" opacity="0.9"/>
  <circle cx="200" cy="588" r="2" fill="#2DD4BF" opacity="0.8"/>
  <circle cx="245" cy="600" r="2.5" fill="#2DD4BF" opacity="0.9"/>
  <circle cx="310" cy="583" r="2" fill="#2DD4BF" opacity="0.7"/>
  <circle cx="350" cy="595" r="3" fill="#2DD4BF" opacity="0.9"/>
  <circle cx="390" cy="588" r="2" fill="#2DD4BF" opacity="0.8"/>
  <circle cx="430" cy="602" r="2.5" fill="#2DD4BF" opacity="0.9"/>
  <circle cx="475" cy="585" r="2" fill="#2DD4BF" opacity="0.7"/>
