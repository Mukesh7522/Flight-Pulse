  <line x1="60" y1="335" x2="370" y2="335" stroke="#1E293B" stroke-width="1"/>
  <text x="60" y="358" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Single canvas renders all icons</text>
  <text x="60" y="376" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Zoom-adaptive sampling (800 → full)</text>
  <text x="60" y="394" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">● Viewport culling at zoom 7+</text>

