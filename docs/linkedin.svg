  <text x="600" y="460" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="3">TECH  STACK</text>

  <!-- Stack pills -->
  <!-- Python -->
  <rect x="64" y="472" width="76" height="26" rx="13" fill="#1A2E1A" stroke="#22C55E" stroke-width="1"/>
  <text x="102" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#86EFAC">Python</text>

  <!-- PostgreSQL -->
  <rect x="152" y="472" width="90" height="26" rx="13" fill="#1A2535" stroke="#3B82F6" stroke-width="1"/>
  <text x="197" y="489" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#93C5FD">PostgreSQL</text>

  <!-- Supabase -->
