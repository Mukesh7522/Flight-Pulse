<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060C1A"/>
      <stop offset="100%" stop-color="#0D1B2E"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2435"/>
      <stop offset="100%" stop-color="#0A1A28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2DD4BF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="225" x2="1200" y2="225" stroke="#1E293B" stroke-width="0.5"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#1E293B" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="675" stroke="#1E293B" stroke-width="0.5"/>
  <line x1="800" y1="0" x2="800" y2="675" stroke="#1E293B" stroke-width="0.5"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#tealGrad)"/>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <!-- Plane icon -->
  <text x="58" y="70" font-family="ui-monospace,monospace" font-size="34" fill="#2DD4BF" filter="url(#glow)">✈</text>

  <text x="104" y="52" font-family="ui-sans-serif,Arial,sans-serif" font-size="28" font-weight="800" fill="#F1F5F9" letter-spacing="1">FlightPulse</text>
  <text x="104" y="75" font-family="ui-sans-serif,Arial,sans-serif" font-size="13" fill="#94A3B8" letter-spacing="2">REAL-TIME GLOBAL FLIGHT INTELLIGENCE</text>

  <!-- Live badge -->
  <rect x="1060" y="28" width="110" height="32" rx="16" fill="#7F1D1D" stroke="#F87171" stroke-width="1"/>
  <circle cx="1080" cy="44" r="5" fill="#F87171">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="1091" y="49" font-family="ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="700" fill="#FCA5A5">LIVE</text>

  <!-- Divider -->
  <line x1="40" y1="96" x2="1160" y2="96" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="40" y1="97" x2="320" y2="97" stroke="#2DD4BF" stroke-width="2"/>

  <!-- ══════════════════════════════════════
       PIPELINE FLOW — center of page
  ══════════════════════════════════════ -->

  <!-- Step 1: ADS-B / OpenSky -->
  <rect x="40" y="120" width="200" height="110" rx="12" fill="#0D1424" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="40" y="120" width="200" height="34" rx="12" fill="#0E3A4A"/>
  <text x="140" y="142" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700" fill="#67E8F9" letter-spacing="1">ADS-B NETWORK</text>
  <text x="140" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">OpenSky Network API</text>
  <text x="140" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">~9,000 aircraft</text>
  <text x="140" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">icao24 · lat · lon · alt</text>
  <text x="140" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">velocity · heading</text>

  <!-- Arrow -->
  <line x1="242" y1="175" x2="268" y2="175" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Python Ingestion -->
  <rect x="270" y="120" width="200" height="110" rx="12" fill="#0D1424" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="270" y="120" width="200" height="34" rx="12" fill="#1E2D4A"/>
  <text x="370" y="142" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700" fill="#93C5FD" letter-spacing="1">PYTHON PIPELINE</text>
  <text x="370" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">fetch_flights.py</text>
  <text x="370" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">parse · validate</text>
  <text x="370" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">bulk upsert 2,000/batch</text>
  <text x="370" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">GitHub Actions cron</text>

  <!-- Arrow -->
  <line x1="472" y1="175" x2="498" y2="175" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Supabase -->
  <rect x="500" y="120" width="200" height="110" rx="12" fill="#0D1424" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="500" y="120" width="200" height="34" rx="12" fill="#0F2A18"/>
  <text x="600" y="142" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700" fill="#86EFAC" letter-spacing="1">SUPABASE</text>
  <text x="600" y="168" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#94A3B8">PostgreSQL · PostgREST</text>
  <text x="600" y="184" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">flights_live · anomaly_hourly</text>
  <text x="600" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">5 SQL views · ghost RPC</text>
  <text x="600" y="216" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#64748B">Realtime subscriptions</text>

  <!-- Arrow -->
  <line x1="702" y1="175" x2="728" y2="175" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Dashboard -->
  <rect x="730" y="120" width="200" height="110" rx="12" fill="#0D1424" stroke="#2DD4BF" stroke-width="1.5"/>
  <rect x="730" y="120" width="200" height="34" rx="12" fill="#0E2E2E"/>
  <text x="830" y="142" text-anchor="middle" font-family="ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700" fill="#5EEAD4" letter-spacing="1">REACT DASHBOARD</text>
